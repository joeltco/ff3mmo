<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NES Sprite Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 16px; }
    h1 { font-size: 16px; color: #c8a832; margin-bottom: 12px; }
    .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 12px; padding: 8px; background: #222; border-radius: 4px; }
    .controls label { font-size: 12px; color: #aaa; }
    .controls input[type="number"] { width: 100px; background: #333; color: #e0e0e0; border: 1px solid #555; padding: 4px 6px; font-size: 13px; font-family: 'Courier New', monospace; }
    .controls select { background: #333; color: #e0e0e0; border: 1px solid #555; padding: 4px 6px; font-size: 13px; }
    button { background: #333; color: #e0e0e0; border: 1px solid #555; padding: 4px 10px; font-size: 12px; cursor: pointer; border-radius: 3px; }
    button:hover { background: #444; }
    #info { font-size: 12px; color: #888; margin-bottom: 8px; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; border: 1px solid #444; }
    #hover-info { font-size: 12px; color: #aaa; margin-top: 8px; }
    .presets { display: flex; gap: 4px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <h1>NES Sprite Viewer</h1>

  <div class="controls">
    <input type="file" id="rom-file">
    <span id="rom-name" style="font-size:11px;color:#666;"></span>
  </div>

  <div class="controls">
    <label>Offset (dec): <input type="number" id="offset-input" value="0" min="0" step="16"></label>
    <label>Hex: <input type="text" id="offset-hex" value="0x000000" style="width:100px;background:#333;color:#e0e0e0;border:1px solid #555;padding:4px 6px;font-size:13px;font-family:'Courier New',monospace;"></label>
    <label>Cols: <input type="number" id="cols" value="16" min="1" max="64"></label>
    <label>Rows: <input type="number" id="rows" value="16" min="1" max="64"></label>
    <label>Scale: <select id="scale"><option value="2">2x</option><option value="3" selected>3x</option><option value="4">4x</option><option value="6">6x</option></select></label>
  </div>

  <div class="controls">
    <span style="font-size:11px;color:#888;">Presets:</span>
    <div class="presets">
      <button onclick="goTo(0x04BF10)">FF2 Adamantoise</button>
      <button onclick="goTo(0x049B10)">FF2 NPC Sprites</button>
      <button onclick="goTo(0x04BB10)">FF2 Misc Sprites</button>
      <button onclick="goTo(0x01C010)">FF3 Map Sprites</button>
      <button onclick="goTo(0x018010)">FF3 Battle BG</button>
      <button onclick="goTo(0)">ROM Start</button>
    </div>
  </div>

  <div id="info">Load a ROM to begin</div>
  <canvas id="c" width="384" height="384"></canvas>
  <div id="hover-info"></div>

  <script>
    // NES system palette (64 colors)
    const PAL = [
      [84,84,84],[0,30,116],[8,16,144],[48,0,136],[68,0,100],[92,0,48],[84,4,0],[60,24,0],
      [32,42,0],[8,58,0],[0,64,0],[0,60,0],[0,50,60],[0,0,0],[0,0,0],[0,0,0],
      [152,150,152],[8,76,196],[48,50,236],[92,30,228],[136,20,176],[160,20,100],[152,34,32],[120,60,0],
      [84,90,0],[40,114,0],[8,124,0],[0,118,40],[0,102,120],[0,0,0],[0,0,0],[0,0,0],
      [236,238,236],[76,154,236],[120,124,236],[176,98,236],[228,84,236],[236,88,180],[236,106,100],[212,136,32],
      [160,170,0],[116,196,0],[76,208,32],[56,204,108],[56,180,220],[60,60,60],[0,0,0],[0,0,0],
      [236,238,236],[168,204,236],[188,188,236],[212,178,236],[236,174,236],[236,174,212],[236,180,176],[228,196,144],
      [204,210,120],[180,222,120],[168,226,144],[152,226,180],[160,214,228],[160,162,160],[0,0,0],[0,0,0]
    ];

    let rom = null;
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // Grayscale palette: transparent, dark gray, light gray, white
    const palette = [PAL[0x0F], PAL[0x00], PAL[0x10], PAL[0x30]];

    function decodeTile(data, off) {
      const px = new Uint8Array(64);
      for (let row = 0; row < 8; row++) {
        const p0 = data[off + row];
        const p1 = data[off + row + 8];
        for (let bit = 0; bit < 8; bit++) {
          const lo = (p0 >> (7 - bit)) & 1;
          const hi = (p1 >> (7 - bit)) & 1;
          px[row * 8 + bit] = (hi << 1) | lo;
        }
      }
      return px;
    }

    function render() {
      if (!rom) return;
      const off = parseInt(document.getElementById('offset-input').value) || 0;
      const cols = parseInt(document.getElementById('cols').value) || 16;
      const rows = parseInt(document.getElementById('rows').value) || 16;
      const scale = parseInt(document.getElementById('scale').value) || 3;

      canvas.width = cols * 8 * scale;
      canvas.height = rows * 8 * scale;
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const total = cols * rows;
      const tmp = document.createElement('canvas');
      tmp.width = 8; tmp.height = 8;
      const tc = tmp.getContext('2d');

      for (let t = 0; t < total; t++) {
        const tOff = off + t * 16;
        if (tOff + 16 > rom.length) break;
        const px = decodeTile(rom, tOff);
        const img = tc.createImageData(8, 8);
        for (let i = 0; i < 64; i++) {
          const c = palette[px[i]];
          img.data[i*4] = c[0]; img.data[i*4+1] = c[1]; img.data[i*4+2] = c[2]; img.data[i*4+3] = 255;
        }
        tc.putImageData(img, 0, 0);
        const col = t % cols;
        const row = Math.floor(t / cols);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(tmp, col * 8 * scale, row * 8 * scale, 8 * scale, 8 * scale);
      }

      document.getElementById('info').textContent =
        'Offset: 0x' + off.toString(16).toUpperCase().padStart(6,'0') +
        ' | ' + total + ' tiles (' + (total*16) + ' bytes)';
    }

    function goTo(offset) {
      document.getElementById('offset-input').value = offset;
      document.getElementById('offset-hex').value = '0x' + offset.toString(16).toUpperCase().padStart(6,'0');
      render();
    }

    document.getElementById('rom-file').addEventListener('change', function(e) {
      const f = e.target.files[0];
      if (!f) return;
      document.getElementById('rom-name').textContent = f.name + ' (' + f.size + ' bytes)';
      const r = new FileReader();
      r.onload = function() {
        rom = new Uint8Array(r.result);
        render();
      };
      r.readAsArrayBuffer(f);
    });

    document.getElementById('offset-input').addEventListener('input', function() {
      const v = parseInt(this.value) || 0;
      document.getElementById('offset-hex').value = '0x' + v.toString(16).toUpperCase().padStart(6,'0');
      render();
    });

    document.getElementById('offset-hex').addEventListener('change', function() {
      const v = parseInt(this.value, 16) || 0;
      document.getElementById('offset-input').value = v;
      render();
    });

    document.getElementById('cols').addEventListener('input', render);
    document.getElementById('rows').addEventListener('input', render);
    document.getElementById('scale').addEventListener('change', render);

    canvas.addEventListener('mousemove', function(e) {
      if (!rom) return;
      const rect = canvas.getBoundingClientRect();
      const scale = parseInt(document.getElementById('scale').value) || 3;
      const cols = parseInt(document.getElementById('cols').value) || 16;
      const px = (e.clientX - rect.left) * (canvas.width / rect.width);
      const py = (e.clientY - rect.top) * (canvas.height / rect.height);
      const tc = Math.floor(px / (8 * scale));
      const tr = Math.floor(py / (8 * scale));
      const ti = tr * cols + tc;
      const off = (parseInt(document.getElementById('offset-input').value) || 0) + ti * 16;
      document.getElementById('hover-info').textContent =
        'Tile ' + ti + ' | Offset: 0x' + off.toString(16).toUpperCase().padStart(6,'0');
    });
  </script>
</body>
</html>
