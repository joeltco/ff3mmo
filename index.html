<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF3 MMO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e1a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    h1 {
      font-size: 20px;
      color: #c8a832;
      text-shadow: 0 0 12px rgba(200, 168, 50, 0.3);
      letter-spacing: 2px;
    }
    #rom-picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #rom-picker label {
      cursor: pointer;
      background: linear-gradient(180deg, #3a3a50, #2a2a3e);
      padding: 10px 24px;
      border: 1px solid #555;
      border-radius: 6px;
      color: #c8a832;
      font-size: 13px;
      letter-spacing: 1px;
      transition: background 0.15s, border-color 0.15s;
    }
    #rom-picker label:hover {
      background: linear-gradient(180deg, #4a4a60, #3a3a4e);
      border-color: #c8a832;
    }
    #rom-file { display: none; }
    #rom-info {
      font-size: 12px;
      color: #888;
      min-height: 16px;
    }
    #canvas-wrapper {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      border-radius: 4px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.6), 0 0 2px rgba(200, 168, 50, 0.15);
      display: none;
    }
    #game-canvas {
      display: block;
      width: 512px;
      height: 480px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #controls-hint {
      font-size: 11px;
      color: #555;
      display: none;
      letter-spacing: 1px;
    }
    #controls-hint kbd {
      background: #222;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>FF3 MMO</h1>

  <div id="rom-picker">
    <label for="rom-file">Load FF3 ROM (.nes)</label>
    <input type="file" id="rom-file" accept=".nes,.bin">
  </div>

  <div id="rom-info"></div>

  <div id="canvas-wrapper">
    <canvas id="game-canvas"></canvas>
  </div>

  <div id="controls-hint"><kbd>&larr;</kbd> <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&rarr;</kbd> Move &nbsp;&middot;&nbsp; <kbd>Z</kbd> Action</div>

  <script src="lib/libgme.js"></script>
  <script type="module">
    import { init, loadROM } from './src/game.js';

    init();

    document.getElementById('rom-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        const arrayBuffer = await file.arrayBuffer();
        loadROM(arrayBuffer);

        document.getElementById('canvas-wrapper').style.display = 'block';
        document.getElementById('controls-hint').style.display = 'block';
        document.getElementById('rom-picker').style.display = 'none';
      } catch (err) {
        document.getElementById('rom-info').textContent = `Error: ${err.message}`;
        console.error(err);
      }
    });
  </script>
</body>
</html>
