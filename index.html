<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF3 MMO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e1a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    h1 {
      font-size: 20px;
      color: #c8a832;
      text-shadow: 0 0 12px rgba(200, 168, 50, 0.3);
      letter-spacing: 2px;
    }
    #rom-picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #rom-picker label {
      cursor: pointer;
      background: linear-gradient(180deg, #3a3a50, #2a2a3e);
      padding: 10px 24px;
      border: 1px solid #555;
      border-radius: 6px;
      color: #c8a832;
      font-size: 13px;
      letter-spacing: 1px;
      transition: background 0.15s, border-color 0.15s;
    }
    #rom-picker label:hover {
      background: linear-gradient(180deg, #4a4a60, #3a3a4e);
      border-color: #c8a832;
    }
    #rom-file, #rom-file-ff12 { display: none; }
    #rom-info {
      font-size: 12px;
      color: #888;
      min-height: 16px;
    }
    #canvas-wrapper {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      border-radius: 4px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.6), 0 0 2px rgba(200, 168, 50, 0.15);
      display: none;
      position: relative;
    }
    #canvas-wrapper.crt::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 1px,
        rgba(0, 0, 0, 0.25) 1px,
        rgba(0, 0, 0, 0.25) 2px
      );
    }
    #game-canvas {
      display: block;
      width: 512px;
      height: 480px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #controls-hint {
      font-size: 11px;
      color: #555;
      display: none;
      letter-spacing: 1px;
    }
    #controls-hint kbd {
      background: #222;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 11px;
      color: #aaa;
    }

    /* Mobile canvas scaling */
    @media (max-width: 520px) {
      #game-canvas {
        width: 100vw;
        height: calc(100vw * (480 / 512));
      }
    }

    /* Mobile controls */
    #mobile-controls {
      display: none;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 512px;
      padding: 12px 20px;
      gap: 16px;
      user-select: none;
      -webkit-user-select: none;
    }
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 2px;
    }
    .dpad-btn {
      width: 52px;
      height: 52px;
      background: #1e1e2e;
      border: 2px solid #444;
      border-radius: 6px;
      color: #c8a832;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: #3a3a50;
      border-color: #c8a832;
    }
    .dpad-btn.transparent {
      background: transparent;
      border-color: transparent;
      pointer-events: none;
    }
    .dpad-center {
      background: #111;
      border-color: #333;
      pointer-events: none;
    }
    #action-btns {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }
    .ab-row {
      display: flex;
      gap: 10px;
    }
    .action-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid #444;
      background: #1e1e2e;
      color: #c8a832;
      font-size: 16px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active, .action-btn.pressed {
      background: #3a3a50;
      border-color: #c8a832;
    }
    .start-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid #444;
      background: #1e1e2e;
      color: #c8a832;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      touch-action: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .start-btn:active, .start-btn.pressed {
      background: #3a3a50;
      border-color: #c8a832;
    }
    @media (max-width: 520px) {
      #mobile-controls {
        display: flex;
      }
    }

    /* Hidden input for mobile keyboard */
    #mobile-input {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0.01; /* must be > 0 and in-viewport for iOS to fire input events */
      font-size: 16px; /* prevents iOS zoom on focus */
      border: none;
      outline: none;
      background: transparent;
      color: transparent;
      caret-color: transparent;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>FF3 MMO</h1>

  <div id="rom-picker">
    <label for="rom-file">Load FF3 ROM (.nes)</label>
    <input type="file" id="rom-file">
    <br><br>
    <label for="rom-file-ff12">Load FF1&amp;2 ROM (.nes)</label>
    <input type="file" id="rom-file-ff12">
  </div>

  <div id="rom-info"></div>

  <div id="canvas-wrapper" class="crt">
    <canvas id="game-canvas"></canvas>
  </div>

  <div id="controls-hint"><kbd>&larr;</kbd> <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&rarr;</kbd> Move &nbsp;&middot;&nbsp; <kbd>Z</kbd> Action &nbsp;&middot;&nbsp; <kbd>X</kbd> Back</div>

  <div id="mobile-controls">
    <div id="dpad">
      <div class="dpad-btn transparent"></div>
      <button class="dpad-btn" data-key="ArrowUp">▲</button>
      <div class="dpad-btn transparent"></div>
      <button class="dpad-btn" data-key="ArrowLeft">◀</button>
      <div class="dpad-btn dpad-center"></div>
      <button class="dpad-btn" data-key="ArrowRight">▶</button>
      <div class="dpad-btn transparent"></div>
      <button class="dpad-btn" data-key="ArrowDown">▼</button>
      <div class="dpad-btn transparent"></div>
    </div>
    <div id="action-btns">
      <div class="ab-row">
        <button class="action-btn" data-key="x">B</button>
        <button class="action-btn" data-key="z">A</button>
      </div>
      <div class="ab-row">
        <button class="start-btn" data-key="s">LIST</button>
        <button class="start-btn" data-key="Enter">START</button>
        <button class="start-btn" data-key="t">CHAT</button>
      </div>
    </div>
  </div>

  <input type="text" id="mobile-input" autocomplete="new-password" autocorrect="off" autocapitalize="off" autocomplete="off" spellcheck="false" data-form-type="other">

  <script src="lib/libgme.js"></script>
  <script type="module">
    import { init, loadROM, loadFF12ROM, getMobileInputMode } from './src/game.js';

    init();

    let ff3Buffer = null;
    let ff12Buffer = null;

    // --- IndexedDB ROM cache ---
    const DB_NAME = 'ff3mmo-roms';
    const DB_VERSION = 1;
    const STORE = 'roms';

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => req.result.createObjectStore(STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function cacheROM(key, buffer) {
      const db = await openDB();
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(buffer, key);
      return new Promise((resolve, reject) => {
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    async function getCachedROM(key) {
      const db = await openDB();
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(key);
      return new Promise((resolve) => {
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => resolve(null);
      });
    }

    // --- Launch ---


    async function tryLaunch() {
      if (!ff3Buffer || !ff12Buffer) return;
      try {
        loadFF12ROM(ff12Buffer);
        await loadROM(ff3Buffer);
        document.getElementById('canvas-wrapper').style.display = 'block';
        document.getElementById('controls-hint').style.display = 'block';
        document.getElementById('rom-picker').style.display = 'none';
      } catch (err) {
        document.getElementById('rom-info').textContent = `Error: ${err.message}`;
        console.error(err);
      }
    }

    // Try loading from cache first
    try {
      const [cached3, cached12] = await Promise.all([
        getCachedROM('ff3'),
        getCachedROM('ff12')
      ]);
      if (cached3) ff3Buffer = cached3;
      if (cached12) ff12Buffer = cached12;
      if (ff3Buffer && ff12Buffer) {
        // Show start button — user click needed for audio context
        const picker = document.getElementById('rom-picker');
        picker.innerHTML = '';
        const btn = document.createElement('label');
        btn.textContent = 'Start';
        btn.style.cursor = 'pointer';
        btn.addEventListener('click', () => tryLaunch());
        picker.appendChild(btn);
        document.getElementById('rom-info').textContent = 'ROMs loaded from cache';
      } else if (ff3Buffer) {
        document.getElementById('rom-info').textContent = 'FF3 cached — load FF1&2 ROM';
      } else if (ff12Buffer) {
        document.getElementById('rom-info').textContent = 'FF1&2 cached — load FF3 ROM';
      }
    } catch (e) {
      // IndexedDB unavailable, fall through to file pickers
    }

    document.getElementById('rom-file')?.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      ff3Buffer = await file.arrayBuffer();
      cacheROM('ff3', ff3Buffer).catch(() => {});
      document.getElementById('rom-info').textContent = 'FF3 loaded' + (ff12Buffer ? ' | FF1&2 loaded' : ' — load FF1&2 ROM');
      tryLaunch();
    });

    document.getElementById('rom-file-ff12')?.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      ff12Buffer = await file.arrayBuffer();
      cacheROM('ff12', ff12Buffer).catch(() => {});
      document.getElementById('rom-info').textContent = (ff3Buffer ? 'FF3 loaded | ' : '') + 'FF1&2 loaded' + (!ff3Buffer ? ' — load FF3 ROM' : '');
      tryLaunch();
    });

    // Mobile keyboard — hidden input brings up OS keyboard when game enters text mode
    const mobileInput = document.getElementById('mobile-input');
    let mobileKbMode = 'none';

    setInterval(() => {
      const mode = getMobileInputMode();
      if (mode !== mobileKbMode) {
        mobileKbMode = mode;
        if (mode !== 'none') {
          mobileInput.value = '';
          mobileInput.focus();
        } else {
          mobileInput.blur();
        }
      }
    }, 80);

    const AUTOCORRECT_TYPES = new Set(['insertReplacementText']);
    mobileInput.addEventListener('input', (e) => {
      if (e.inputType === 'deleteContentBackward') {
        window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Backspace', bubbles: true }));
      } else if (e.data && !AUTOCORRECT_TYPES.has(e.inputType)) {
        for (const ch of e.data) {
          window.dispatchEvent(new KeyboardEvent('keydown', { key: ch, bubbles: true }));
        }
      }
      mobileInput.value = '';
    });

    mobileInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true }));
      } else if (e.key === 'Escape') {
        window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape', bubbles: true }));
      }
    });

    // When CHAT button is tapped, focus input immediately after game sets mode
    document.querySelectorAll('[data-key="t"]').forEach(btn => {
      btn.addEventListener('touchend', () => {
        setTimeout(() => { if (getMobileInputMode() !== 'none') mobileInput.focus(); }, 100);
      }, { passive: true });
    });

    // Mobile touch controls
    document.querySelectorAll('[data-key]').forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.classList.add('pressed');
        window.dispatchEvent(new KeyboardEvent('keydown', { key: btn.dataset.key, bubbles: true }));
      }, { passive: false });
      const release = (e) => {
        e.preventDefault();
        btn.classList.remove('pressed');
        window.dispatchEvent(new KeyboardEvent('keyup', { key: btn.dataset.key, bubbles: true }));
      };
      btn.addEventListener('touchend', release, { passive: false });
      btn.addEventListener('touchcancel', release, { passive: false });
    });
  </script>
</body>
</html>
