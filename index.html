<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF3 MMO — Town of Ur</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }
    h1 {
      font-size: 18px;
      color: #c8a832;
    }
    #rom-picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #rom-picker label {
      cursor: pointer;
      background: #333;
      padding: 8px 16px;
      border: 1px solid #555;
      border-radius: 4px;
    }
    #rom-picker label:hover {
      background: #444;
    }
    #rom-file { display: none; }
    #rom-info {
      font-size: 12px;
      color: #888;
      min-height: 16px;
    }
    #canvas-wrapper {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #444;
      display: none;
    }
    #game-canvas {
      display: block;
      width: 512px;   /* 256 * 2 = 2x scale */
      height: 480px;  /* 240 * 2 = 2x scale */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #controls-hint {
      font-size: 12px;
      color: #666;
      display: none;
    }
  </style>
</head>
<body>
  <h1>FF3 MMO — Town of Ur</h1>

  <div id="rom-picker">
    <label for="rom-file">Load FF3 ROM (.nes)</label>
    <input type="file" id="rom-file" accept=".nes,.bin">
  </div>

  <div id="rom-info"></div>

  <div id="canvas-wrapper">
    <canvas id="game-canvas"></canvas>
  </div>

  <div id="controls-hint">Arrow keys to walk</div>

  <script type="module">
    import { init, loadROM } from './src/game.js';

    init();

    document.getElementById('rom-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        const arrayBuffer = await file.arrayBuffer();
        loadROM(arrayBuffer);

        document.getElementById('canvas-wrapper').style.display = 'block';
        document.getElementById('controls-hint').style.display = 'block';
        document.getElementById('rom-picker').style.display = 'none';
      } catch (err) {
        document.getElementById('rom-info').textContent = `Error: ${err.message}`;
        console.error(err);
      }
    });
  </script>
</body>
</html>
