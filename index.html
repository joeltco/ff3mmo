<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF3 MMO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e1a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    h1 {
      font-size: 20px;
      color: #c8a832;
      text-shadow: 0 0 12px rgba(200, 168, 50, 0.3);
      letter-spacing: 2px;
    }
    #rom-picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #rom-picker label {
      cursor: pointer;
      background: linear-gradient(180deg, #3a3a50, #2a2a3e);
      padding: 10px 24px;
      border: 1px solid #555;
      border-radius: 6px;
      color: #c8a832;
      font-size: 13px;
      letter-spacing: 1px;
      transition: background 0.15s, border-color 0.15s;
    }
    #rom-picker label:hover {
      background: linear-gradient(180deg, #4a4a60, #3a3a4e);
      border-color: #c8a832;
    }
    #rom-file, #rom-file-ff12 { display: none; }
    #rom-info {
      font-size: 12px;
      color: #888;
      min-height: 16px;
    }
    #canvas-wrapper {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      border-radius: 4px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.6), 0 0 2px rgba(200, 168, 50, 0.15);
      display: none;
      position: relative;
    }
    #canvas-wrapper.crt::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 1px,
        rgba(0, 0, 0, 0.25) 1px,
        rgba(0, 0, 0, 0.25) 2px
      );
    }
    #game-canvas {
      display: block;
      width: 512px;
      height: 480px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #version-badge {
      position: fixed;
      bottom: 4px;
      left: 6px;
      font-size: 10px;
      color: #333;
      pointer-events: none;
      z-index: 9999;
    }
    #controls-hint {
      font-size: 11px;
      color: #555;
      display: none;
      letter-spacing: 1px;
    }
    #controls-hint kbd {
      background: #222;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 11px;
      color: #aaa;
    }

    @media (max-width: 520px) {
      #controls-hint { display: none !important; }
    }

    /* Mobile layout — flush to top, no gaps */
    @media (max-width: 520px) {
      body {
        justify-content: flex-start;
        gap: 0;
      }
      #canvas-wrapper {
        border-radius: 0;
        border-left: none;
        border-right: none;
      }
    }

    /* Mobile canvas scaling */
    @media (max-width: 520px) {
      #game-canvas {
        width: 100vw;
        height: calc(100vw * (480 / 512));
      }
      #canvas-wrapper.crt::after {
        background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
      }
    }

    /* Mobile controls */
    #mobile-controls {
      display: none;
      flex-direction: column;
      width: 100%;
      user-select: none;
      -webkit-user-select: none;
    }
    #utility-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      background: #0a0a14;
      border-bottom: 1px solid #222;
    }
    #main-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
    }
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 2px;
    }
    .dpad-btn {
      width: 56px;
      height: 56px;
      background: #1e1e2e;
      border: 2px solid #444;
      border-radius: 6px;
      color: #c8a832;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: #3a3a50;
      border-color: #c8a832;
    }
    .dpad-btn.transparent {
      background: transparent;
      border-color: transparent;
      pointer-events: none;
    }
    .dpad-center {
      background: #111;
      border-color: #333;
      pointer-events: none;
    }
    #action-btns {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .action-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid #444;
      background: #1e1e2e;
      color: #c8a832;
      font-size: 20px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active, .action-btn.pressed {
      background: #3a3a50;
      border-color: #c8a832;
    }
    .util-btn {
      flex: 1;
      max-width: 90px;
      padding: 7px 4px;
      border-radius: 14px;
      border: 1px solid #383848;
      background: #16161f;
      color: #888;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      text-align: center;
      touch-action: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .util-btn:active, .util-btn.pressed {
      background: #2a2a3e;
      border-color: #c8a832;
      color: #c8a832;
    }
    @media (max-width: 520px) {
      #mobile-controls {
        display: flex;
      }
    }

    /* Auth screen */
    #auth-screen {
      position: fixed;
      inset: 0;
      background: #0e0e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9998;
    }
    #auth-screen h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: #c8a832;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    #auth-tabs {
      display: flex;
      gap: 0;
      border: 1px solid #444;
      border-radius: 6px;
      overflow: hidden;
    }
    .auth-tab {
      padding: 8px 24px;
      background: #1e1e2e;
      color: #888;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border: none;
      letter-spacing: 1px;
    }
    .auth-tab.active {
      background: #3a3a50;
      color: #c8a832;
    }
    #auth-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 280px;
    }
    #auth-form input {
      background: #1e1e2e;
      border: 2px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 15px;
      font-family: 'Courier New', monospace;
      padding: 10px 14px;
      outline: none;
      width: 100%;
    }
    #auth-form input:focus { border-color: #c8a832; }
    #auth-submit {
      padding: 10px;
      background: linear-gradient(180deg, #3a3a50, #2a2a3e);
      border: 2px solid #555;
      border-radius: 6px;
      color: #c8a832;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      cursor: pointer;
      width: 100%;
    }
    #auth-submit:hover { border-color: #c8a832; }
    #auth-err {
      color: #c04040;
      font-size: 11px;
      min-height: 16px;
      text-align: center;
    }
    #auth-user-bar {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 11px;
      color: #555;
      display: none;
      gap: 8px;
      align-items: center;
      z-index: 100;
    }
    #auth-user-bar span { color: #888; }
    #auth-logout {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      color: #666;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      padding: 2px 8px;
      cursor: pointer;
    }
    #auth-logout:hover { border-color: #c8a832; color: #c8a832; }

    /* Password gate */
    #pw-gate {
      position: fixed;
      inset: 0;
      background: #0e0e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
    }
    #pw-gate h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: #c8a832;
      letter-spacing: 2px;
    }
    #pw-gate input[type=password] {
      background: #1e1e2e;
      border: 2px solid #555;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      padding: 10px 16px;
      outline: none;
      text-align: center;
      width: 220px;
    }
    #pw-gate input[type=password]:focus {
      border-color: #c8a832;
    }
    #pw-gate button {
      padding: 10px 32px;
      background: linear-gradient(180deg, #3a3a50, #2a2a3e);
      border: 2px solid #555;
      border-radius: 6px;
      color: #c8a832;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      cursor: pointer;
    }
    #pw-gate button:hover { border-color: #c8a832; }
    #pw-tagline {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #888;
      letter-spacing: 3px;
    }
    #pw-sub {
      font-size: 12px;
      color: #666;
      text-align: center;
      line-height: 1.8;
      max-width: 320px;
    }
    #pw-gate .pw-err {
      color: #c04040;
      font-size: 12px;
      min-height: 16px;
    }

    /* Font tile viewer overlay */
    #tile-viewer {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0a10;
      display: none;
      flex-direction: column;
      z-index: 500;
      padding: 8px;
      box-sizing: border-box;
    }
    #tile-viewer-header {
      color: #c8a832;
      font-size: 9px;
      letter-spacing: 1px;
      text-align: center;
      padding-bottom: 6px;
      border-bottom: 1px solid #333;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    #tile-viewer-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      overflow-y: scroll;
      height: 55vh;
      align-content: flex-start;
      padding-bottom: 8px;
    }
    .tile-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 3px;
      border: 1px solid #2a2a3a;
      border-radius: 2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tile-cell.tapped {
      border-color: #c8a832;
      background: #1a1a2e;
    }
    .tile-cell canvas { image-rendering: pixelated; }
    .tile-cell span {
      font-size: 7px;
      color: #555;
      font-family: monospace;
    }
    #tv-jump-row {
      display: flex;
      gap: 8px;
      padding: 4px 0 6px;
      flex-shrink: 0;
    }
    #tv-offset {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #444;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 13px;
      padding: 6px 8px;
      outline: none;
    }
    .tv-rom-btn {
      padding: 6px 10px;
      background: #1e1e2e;
      border: 1px solid #444;
      border-radius: 4px;
      color: #888;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tv-rom-btn.active { border-color: #c8a832; color: #c8a832; }
    #tv-go {
      padding: 6px 14px;
      background: #2a2a3e;
      border: 1px solid #555;
      border-radius: 4px;
      color: #c8a832;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
    }
    #tv-frame-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      flex-shrink: 0;
    }
    #tile-viewer-nav {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 8px 0 4px;
      flex-shrink: 0;
    }
    #tile-viewer-nav button {
      width: 64px;
      height: 48px;
      background: #1e1e2e;
      border: 2px solid #444;
      border-radius: 8px;
      color: #c8a832;
      font-size: 20px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #tile-viewer-nav button:active {
      background: #3a3a50;
      border-color: #c8a832;
    }

    /* Hidden input for mobile keyboard */
    #mobile-input {
      position: fixed;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0.01;
      font-size: 16px; /* prevents iOS zoom on focus */
      border: none;
      outline: none;
      background: transparent;
      color: transparent;
      caret-color: transparent;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Auth screen (login / register) -->
  <div id="auth-screen" style="display:none">
    <h2>FF3 MMO</h2>
    <div id="auth-tabs">
      <button class="auth-tab active" id="tab-login">Login</button>
      <button class="auth-tab" id="tab-register">Register</button>
    </div>
    <div id="auth-form">
      <input type="email" id="auth-email" placeholder="email" autocomplete="email">
      <input type="password" id="auth-password" placeholder="password" autocomplete="current-password">
      <div id="auth-err"></div>
      <button id="auth-submit">Login</button>
    </div>
  </div>
  <div id="auth-user-bar">
    <span id="auth-email-display"></span>
    <button id="auth-logout">Logout</button>
  </div>

  <!-- Password gate -->
  <div id="pw-gate">
    <h2>FF3 MMO</h2>
    <p id="pw-tagline">&#9670; Coming Soon &#9670;</p>
    <p id="pw-sub">Something is being built here.<br>Closed beta — invite only.</p>
    <input type="password" id="pw-input" placeholder="beta password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="pw-submit">Enter</button>
    <div class="pw-err" id="pw-err"></div>
  </div>

  <h1>FF3 MMO</h1>

  <div id="rom-picker-wrap" style="display:none; text-align:center">
    <div id="rom-picker">
      <label for="rom-file">Load FF3 ROM (.nes)</label>
      <input type="file" id="rom-file">
      <br><br>
      <label for="rom-file-ff12">Load FF1&amp;2 ROM (.nes)</label>
      <input type="file" id="rom-file-ff12">
    </div>
    <div id="rom-info"></div>
  </div>

  <div id="canvas-wrapper" class="crt">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="version-badge">v{{VERSION}}</div>
  <div id="tile-viewer">
    <div id="tile-viewer-header">ROM TILES</div>
    <div id="tv-jump-row">
      <button id="tv-rom3" class="tv-rom-btn active">FF3</button>
      <button id="tv-rom12" class="tv-rom-btn">FF1&2</button>
      <button id="tv-sprite" class="tv-rom-btn">SPRITE</button>
      <button id="tv-layout" class="tv-rom-btn" style="display:none">ROW</button>
      <button id="tv-height" class="tv-rom-btn" style="display:none">24</button>
      <button id="tv-pal" class="tv-rom-btn" style="display:none">PAL0</button>
      <button id="tv-bank" class="tv-rom-btn">CHAR $28</button>
      <button id="tv-poses" class="tv-rom-btn">POSES</button>
      <button id="tv-export" class="tv-rom-btn" style="display:none">EXPORT</button>
      <input id="tv-offset" type="text" placeholder="offset (hex)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button id="tv-go">GO</button>
    </div>
    <div id="tile-viewer-grid"></div>
    <div id="tv-frame-row" style="display:none">
      <button id="tv-fprev" class="tv-rom-btn">◀ FRAME</button>
      <span id="tv-frame-label" style="color:#c8a832;font-size:9px;font-family:monospace;padding:0 6px;align-self:center">F0</span>
      <button id="tv-fnext" class="tv-rom-btn">FRAME ▶</button>
    </div>
    <div id="tile-viewer-nav">
      <button id="tv-up">▲</button>
      <button id="tv-close">X</button>
      <button id="tv-down">▼</button>
    </div>
  </div>

  <div id="tv-export-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a10;z-index:600;padding:8px;box-sizing:border-box;flex-direction:column;gap:8px;">
    <div style="color:#c8a832;font-size:9px;font-family:monospace;text-align:center;padding-bottom:6px;border-bottom:1px solid #333;">POSE BYTES — COPY INTO game.js</div>
    <textarea id="tv-export-text" style="flex:1;background:#1e1e2e;color:#e0e0e0;font-family:monospace;font-size:10px;border:1px solid #444;border-radius:4px;padding:8px;resize:none;width:100%;height:70vh;" readonly></textarea>
    <button id="tv-export-close" style="padding:10px;background:#1e1e2e;border:2px solid #444;border-radius:8px;color:#c8a832;font-family:monospace;font-size:13px;cursor:pointer;">CLOSE</button>
  </div>
  <div id="controls-hint"><kbd>&larr;</kbd> <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&rarr;</kbd> Move &nbsp;&middot;&nbsp; <kbd>Z</kbd> Action &nbsp;&middot;&nbsp; <kbd>X</kbd> Back</div>

  <div id="mobile-controls">
    <div id="utility-row">
      <button class="util-btn" data-key="t">CHAT</button>
      <button class="util-btn" data-key="T">LOG</button>
      <button class="util-btn" data-key="s">SELECT</button>
      <button class="util-btn" data-key="Enter">START</button>
    </div>
    <div id="main-controls">
      <div id="dpad">
        <div class="dpad-btn transparent"></div>
        <button class="dpad-btn" data-key="ArrowUp">▲</button>
        <div class="dpad-btn transparent"></div>
        <button class="dpad-btn" data-key="ArrowLeft">◀</button>
        <div class="dpad-btn dpad-center"></div>
        <button class="dpad-btn" data-key="ArrowRight">▶</button>
        <div class="dpad-btn transparent"></div>
        <button class="dpad-btn" data-key="ArrowDown">▼</button>
        <div class="dpad-btn transparent"></div>
      </div>
      <div id="action-btns">
        <button class="action-btn" data-key="x">B</button>
        <button class="action-btn" data-key="z">A</button>
      </div>
    </div>
  </div>

  <input type="password" id="mobile-input" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false">

  <script src="lib/libgme.js"></script>
  <script type="module">
    import { init, loadROM, loadFF12ROM, getMobileInputMode } from './src/game.js';
    import { decodeTile, NES_SYSTEM_PALETTE } from './src/tile-decoder.js';

    // --- Auth ---
    const API = '';  // same origin
    let authToken = localStorage.getItem('ff3_token');
    let authEmail = localStorage.getItem('ff3_email');

    const authScreen = document.getElementById('auth-screen');
    const authEmailInput = document.getElementById('auth-email');
    const authPasswordInput = document.getElementById('auth-password');
    const authErr = document.getElementById('auth-err');
    const authSubmit = document.getElementById('auth-submit');
    const authUserBar = document.getElementById('auth-user-bar');
    const authEmailDisplay = document.getElementById('auth-email-display');
    let authMode = 'login';

    document.getElementById('tab-login').addEventListener('click', () => {
      authMode = 'login';
      document.getElementById('tab-login').classList.add('active');
      document.getElementById('tab-register').classList.remove('active');
      authSubmit.textContent = 'Login';
      authErr.textContent = '';
    });
    document.getElementById('tab-register').addEventListener('click', () => {
      authMode = 'register';
      document.getElementById('tab-register').classList.add('active');
      document.getElementById('tab-login').classList.remove('active');
      authSubmit.textContent = 'Register';
      authErr.textContent = '';
    });

    async function doAuth() {
      const email = authEmailInput.value.trim();
      const password = authPasswordInput.value;
      if (!email || !password) { authErr.textContent = 'Fill in all fields.'; return; }
      authSubmit.disabled = true;
      authErr.textContent = '';
      try {
        const res = await fetch(`${API}/api/${authMode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) { authErr.textContent = data.error || 'Error'; authSubmit.disabled = false; return; }
        authToken = data.token;
        authEmail = data.email;
        localStorage.setItem('ff3_token', authToken);
        localStorage.setItem('ff3_email', authEmail);
        showAuthBar();
        authScreen.style.display = 'none';
        showROMPicker();
      } catch (e) {
        authErr.textContent = 'Network error.';
      }
      authSubmit.disabled = false;
    }

    authSubmit.addEventListener('click', doAuth);
    authPasswordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });
    authEmailInput.addEventListener('keydown', e => { if (e.key === 'Enter') authPasswordInput.focus(); });

    function showAuthBar() {
      authUserBar.style.display = 'flex';
      authEmailDisplay.textContent = authEmail;
    }

    document.getElementById('auth-logout').addEventListener('click', () => {
      localStorage.removeItem('ff3_token');

    // --- IndexedDB ROM cache ---
    const DB_NAME = 'ff3mmo-roms';
    const DB_VERSION = 1;
    const STORE = 'roms';

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => req.result.createObjectStore(STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function cacheROM(key, buffer) {
      const db = await openDB();
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(buffer, key);
      return new Promise((resolve, reject) => {
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    async function getCachedROM(key) {
      const db = await openDB();
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(key);
      return new Promise((resolve) => {
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => resolve(null);
      });
    }

    function decodeTileToImageData(rom, off, pal) {
      const pixels = decodeTile(rom, off);
      const img = new ImageData(8, 8);
      for (let p = 0; p < 64; p++) {
        const idx = pixels[p];
        if (pal) {
          const nesColor = pal[idx];
          if (nesColor === 0x0F) {
            img.data[p*4]=0; img.data[p*4+1]=0; img.data[p*4+2]=0; img.data[p*4+3]=255;
          } else {
            const rgb = NES_SYSTEM_PALETTE[nesColor] || [0,0,0];
            img.data[p*4]=rgb[0]; img.data[p*4+1]=rgb[1]; img.data[p*4+2]=rgb[2]; img.data[p*4+3]=255;
          }
        } else {
          const v = idx * 85;
          img.data[p*4]=v; img.data[p*4+1]=v; img.data[p*4+2]=v; img.data[p*4+3]=255;
        }
      }
      return img;
    }

    function renderTilePage() {
      if (!tileRomBuffer) return;
      const rom = new Uint8Array(tileRomBuffer);
      tileGrid.innerHTML = '';

      if (spriteMode) {
        const rows = spriteTall ? 4 : 3;
        const tilesPerSprite = 2 * rows;
        const sprH = rows * 8; // 24 or 32
        const bytesPerSprite = tilesPerSprite * 16;
        const startOff = tileBaseOffset + tilePage * SPRITES_PER_PAGE * bytesPerSprite;
        const totalPages = Math.ceil((rom.length - tileBaseOffset) / (SPRITES_PER_PAGE * bytesPerSprite));
        tileHeader.textContent = 'SPRITE 16×' + sprH + '  PG ' + (tilePage+1) + '/' + totalPages + '  $' + startOff.toString(16).toUpperCase();
        for (let i = 0; i < SPRITES_PER_PAGE; i++) {
          const sprOff = startOff + i * bytesPerSprite;
          if (sprOff + bytesPerSprite - 1 >= rom.length) break;
          const src = document.createElement('canvas');
          src.width = 16; src.height = sprH;
          const sctx = src.getContext('2d');
          for (let t = 0; t < tilesPerSprite; t++) {
            const toff = sprOff + t * 16;
            if (toff + 15 >= rom.length) break;
            const tx = spriteRowMajor ? (t % 2) * 8 : Math.floor(t / rows) * 8;
            const ty = spriteRowMajor ? Math.floor(t / 2) * 8 : (t % rows) * 8;
            const pal = BATTLE_PALETTES[spritePalIdx];
            sctx.putImageData(decodeTileToImageData(rom, toff, pal), tx, ty);
          }
          const scaled = document.createElement('canvas');
          scaled.width = 64; scaled.height = sprH * 4;
          const ssc = scaled.getContext('2d');
          ssc.imageSmoothingEnabled = false;
          ssc.drawImage(src, 0, 0, 64, sprH * 4);
          const label = document.createElement('span');
          label.textContent = '$' + sprOff.toString(16).toUpperCase();
          const cell = document.createElement('div');
          cell.className = 'tile-cell';
          cell.appendChild(scaled);
          cell.appendChild(label);
          cell.addEventListener('click', () => {
            document.getElementById('tv-offset').value = sprOff.toString(16).toUpperCase();
          });
          cell.addEventListener('touchstart', (e) => {
            e.preventDefault();

            cell.classList.add('tapped');
            setTimeout(() => cell.classList.remove('tapped'), 400);
          }, { passive: false });
          tileGrid.appendChild(cell);
        }
      } else {

          ssc.drawImage(src, 0, 0, 32, 32);
          const label = document.createElement('span');
          label.textContent = '$' + off.toString(16).toUpperCase();
          const cell = document.createElement('div');
          cell.className = 'tile-cell';
          cell.appendChild(scaled);
          cell.appendChild(label);
          cell.addEventListener('touchstart', (e) => {

    const OK_LEG_L_FWD_L   = new Uint8Array([0xDC,0xD8,0x04,0x3C,0x3C,0x1C,0x00,0x00, 0x1D,0x1D,0x05,0x3D,0xFD,0xFD,0x79,0x39]);
    const OK_LEG_R_FWD_L   = new Uint8Array([0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00, 0x70,0x78,0xFC,0xBE,0xFF,0xFF,0xFC,0xE0]);
    const OK_LEG_L_BACK_R  = new Uint8Array([0x06,0x0C,0x37,0x3F,0x3F,0x1F,0x00,0x00, 0x1E,0x1F,0x3F,0x3F,0xFF,0xFF,0x78,0x39]);
    const OK_LEG_R_SWING   = new Uint8Array([0xD8,0x70,0x80,0xF0,0xE0,0xC0,0x00,0x00, 0x1C,0x74,0x86,0xF2,0xE3,0xF1,0xF1,0xE1]);
    const OK_LEG_L_KNEEL   = new Uint8Array([0x38,0x18,0x03,0x05,0x0F,0x07,0x07,0x03, 0x38,0x1B,0x07,0x17,0x6F,0x77,0x77,0x33]);
    const OK_LEG_R_KNEEL   = new Uint8Array([0x0E,0xCC,0x80,0xF8,0xE0,0xC0,0xC0,0xC0, 0x0E,0xEC,0xF2,0xF9,0xED,0xDD,0xDD,0xD9]);
    const OK_LEG_L_VICTORY = new Uint8Array([0x37,0x1F,0x0F,0x0F,0x07,0x00,0x00,0x00, 0x3F,0xDF,0xEF,0xEF,0x67,0x08,0x07,0x00]);
    const OK_LEG_R_VICTORY = new Uint8Array([0xE0,0x80,0x00,0x00,0x00,0x00,0x00,0x00, 0xE2,0xB2,0x73,0x73,0x63,0x03,0xFB,0x00]);

    const OK_DEATH_T = [
      new Uint8Array([0x00,0x00,0x00,0x00,0x00,0x03,0x18,0x38, 0x00,0x00,0x00,0x00,0x00,0x00,0x1C,0x3F]),
      new Uint8Array([0x00,0x10,0x00,0x00,0x00,0x00,0x89,0x3B, 0x10,0x28,0x10,0x10,0x00,0x00,0x10,0x00]),
      new Uint8Array([0x00,0x00,0x00,0x00,0x00,0x10,0x08,0x94, 0x00,0x00,0x00,0x40,0xA0,0x30,0x38,0x3C]),
      new Uint8Array([0x3E,0x3D,0x3C,0x3D,0x3B,0x3A,0x1B,0x01, 0x3F,0xBF,0xFE,0xFC,0xFA,0xFA,0xDB,0x01]),
      new Uint8Array([0x3F,0x39,0x3B,0x8E,0xCC,0x40,0xC1,0x8D, 0x90,0x80,0x00,0x10,0x61,0x76,0xF7,0xAD]),
      new Uint8Array([0x98,0x3C,0x30,0x68,0xD0,0xB8,0x30,0xC0, 0x3C,0x7C,0x70,0xEA,0xDD,0xBB,0x7D,0xFA]),
    ];
    const _EMPTY = new Uint8Array(16);
    const OK_POSES = [
      { label: 'IDLE',         tiles: [OK_IDLE_T0, OK_IDLE_T1, OK_IDLE_T2, OK_IDLE_T3, OK_LEG_L, OK_LEG_R], rows: 3 },
      { label: 'L BACK SWING', tiles: [OK_IDLE_T0, OK_IDLE_T1, OK_IDLE_T2, OK_L_BACK[3], OK_LEG_L_BACK_L, OK_LEG_R_BACK_L], rows: 3 },
      { label: 'L FWD SWING',  tiles: [OK_IDLE_T0, OK_IDLE_T1, OK_L_FWD_T2, OK_L_FWD_T3, OK_LEG_L_FWD_L, OK_LEG_R_FWD_L], rows: 3 },
      { label: 'R BACK SWING', tiles: [OK_IDLE_T0, OK_IDLE_T1, OK_R_BACK_T2, OK_IDLE_T3, OK_LEG_L_BACK_R, OK_LEG_R_SWING], rows: 3 },
      { label: 'R FWD SWING',  tiles: [OK_IDLE_T0, OK_IDLE_T1, OK_R_FWD_T2, OK_IDLE_T3, OK_LEG_L, OK_LEG_R_SWING], rows: 3 },
      { label: 'KNEEL',        tiles: [...OK_KNEEL, OK_LEG_L_KNEEL, OK_LEG_R_KNEEL], rows: 3 },
      { label: 'VICTORY',      tiles: [...OK_VICTORY, OK_LEG_L_VICTORY, OK_LEG_R_VICTORY], rows: 3 },
      { label: 'HIT',          tiles: [_EMPTY, _EMPTY, _EMPTY, _EMPTY, _EMPTY, _EMPTY], rows: 3 },
      { label: 'DEATH',        tiles: [...OK_DEATH_T], rows: 2, cols: 3 },
    ];

    let posesMode = false;
    // Mutable session copies of pose tile arrays
    let okPoseTiles = OK_POSES.map(p => ({ label: p.label, rows: p.rows, tiles: p.tiles.map(t => new Uint8Array(t)) }));
    let editPoseIdx = -1;  // which pose is being edited
    let editSlotIdx = -1;  // which tile slot within that pose

    function _renderOneTile8x8(bytes, pal) {
      const src = document.createElement('canvas'); src.width = 8; src.height = 8;
      src.getContext('2d').putImageData(decodeTileToImageData(bytes, 0, pal), 0, 0);
      const scaled = document.createElement('canvas'); scaled.width = 32; scaled.height = 32;
      const sc = scaled.getContext('2d'); sc.imageSmoothingEnabled = false;
      sc.drawImage(src, 0, 0, 32, 32);
      return scaled;
    }

    function renderPosesGrid() {
      tileGrid.innerHTML = '';
      const isPickMode = editPoseIdx >= 0;
      tileHeader.textContent = isPickMode
        ? '▶ TAP ROM TILE TO PLACE INTO ' + okPoseTiles[editPoseIdx].label + ' SLOT ' + editSlotIdx
        : 'ONION KNIGHT — TAP TILE TO EDIT';
      const pal = BATTLE_PALETTES[spritePalIdx];

      for (let pi = 0; pi < okPoseTiles.length; pi++) {
        const pose = okPoseTiles[pi];
        const rows = pose.rows;

        const card = document.createElement('div');
        card.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px;border:1px solid #2a2a3a;border-radius:4px;';
        if (pi === editPoseIdx) card.style.borderColor = '#c8a832';

        const lbl = document.createElement('span');
        lbl.textContent = pose.label;
        lbl.style.cssText = 'color:#c8a832;font-size:7px;font-family:monospace;';
        card.appendChild(lbl);

        const cols = pose.cols || 2;
        const grid = document.createElement('div');
        grid.style.cssText = 'display:grid;grid-template-columns:repeat(' + cols + ',32px);gap:1px;';

        for (let t = 0; t < rows * cols; t++) {
          const bytes = pose.tiles[t];
          const tc = bytes ? _renderOneTile8x8(bytes, pal) : (() => { const c = document.createElement('canvas'); c.width=32; c.height=32; return c; })();
          tc.style.cssText = 'border:1px solid #333;cursor:pointer;-webkit-tap-highlight-color:transparent;';
          if (pi === editPoseIdx && t === editSlotIdx) {
            tc.style.border = '2px solid #c8a832';
            tc.style.boxShadow = '0 0 6px #c8a832';
          }

          const finalPi = pi, finalT = t;
          tc.addEventListener('touchstart', (e) => {
            e.preventDefault();
            editPoseIdx = finalPi; editSlotIdx = finalT;
            posesMode = false;
            document.getElementById('tv-poses').classList.remove('active');
            // Switch to 8×8 tile browse so user can pick a replacement
            spriteMode = false;
            document.getElementById('tv-sprite').classList.remove('active');
            document.getElementById('tv-layout').style.display = 'none';
            document.getElementById('tv-height').style.display = 'none';
            document.getElementById('tv-frame-row').style.display = 'none';
            tileHeader.textContent = '▶ PICK TILE FOR ' + okPoseTiles[finalPi].label + ' SLOT ' + finalT;
            renderTilePage();
          }, { passive: false });

          grid.appendChild(tc);
        }

        // COPY BYTES button per pose
        const copyBtn = document.createElement('button');
        copyBtn.textContent = 'BYTES';
        copyBtn.style.cssText = 'margin-top:2px;font-size:7px;font-family:monospace;padding:2px 4px;background:#1e1e2e;border:1px solid #444;color:#888;border-radius:3px;cursor:pointer;';
        copyBtn.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const lines = pose.tiles.map((b, i) => `  // slot ${i}\n  new Uint8Array([${Array.from(b).map(x=>'0x'+x.toString(16).toUpperCase().padStart(2,'0')).join(',')}]),`);
          document.getElementById('tv-offset').value = lines.join('\n');
        }, { passive: false });
        copyBtn.addEventListener('click', () => {
          const lines = pose.tiles.map((b, i) => `  // slot ${i}\n  new Uint8Array([${Array.from(b).map(x=>'0x'+x.toString(16).toUpperCase().padStart(2,'0')).join(',')}]),`);
          document.getElementById('tv-offset').value = lines.join('\n');
        });
        card.appendChild(grid);
        card.appendChild(copyBtn);
        tileGrid.appendChild(card);
      }
    }

    document.getElementById('tv-poses').addEventListener('click', () => {
      posesMode = !posesMode;
      editPoseIdx = -1; editSlotIdx = -1;
      document.getElementById('tv-poses').classList.toggle('active', posesMode);
      document.getElementById('tv-export').style.display = posesMode ? '' : 'none';
      if (posesMode) { spriteMode = false; renderPosesGrid(); }
      else renderTilePage();
    });

    function _hexBytes(arr) {
      return Array.from(arr).map(x => '0x' + x.toString(16).toUpperCase().padStart(2,'0')).join(',');
    }

    document.getElementById('tv-export').addEventListener('click', () => {
      const lines = okPoseTiles.map(pose => {
        const tileLines = pose.tiles.map((b,i) => `  new Uint8Array([${_hexBytes(b)}]), // slot ${i}`).join('\n');
        return `// ${pose.label}\n[\n${tileLines}\n]`;
      }).join('\n\n');
      document.getElementById('tv-export-text').value = lines;
      const ov = document.getElementById('tv-export-overlay');
      ov.style.display = 'flex';
    });
    document.getElementById('tv-export').addEventListener('touchstart', (e) => {
      e.preventDefault();
      document.getElementById('tv-export').click();
    }, { passive: false });

    document.getElementById('tv-export-close').addEventListener('click', () => {
      document.getElementById('tv-export-overlay').style.display = 'none';
    });
    document.getElementById('tv-export-close').addEventListener('touchstart', (e) => {
      e.preventDefault();
      document.getElementById('tv-export-overlay').style.display = 'none';
    }, { passive: false });

    function _jumpToOnionFrame(delta) {
      if (!tileRomBuffer) return;
      const rom = new Uint8Array(tileRomBuffer);
      onionFrameIdx = Math.max(0, onionFrameIdx + delta);
      tileBaseOffset = ONION_KNIGHT_OFFSET + onionFrameIdx * ONION_FRAME_STEP;
      if (tileBaseOffset >= rom.length) { onionFrameIdx = Math.max(0, onionFrameIdx - delta); tileBaseOffset = ONION_KNIGHT_OFFSET + onionFrameIdx * ONION_FRAME_STEP; }
      tilePage = 0;
      document.getElementById('tv-frame-label').textContent = 'F' + onionFrameIdx + ' $' + tileBaseOffset.toString(16).toUpperCase();
      document.getElementById('tv-offset').value = tileBaseOffset.toString(16).toUpperCase();
      renderTilePage();
    }

    document.getElementById('tv-fprev').addEventListener('click', () => _jumpToOnionFrame(-1));
    document.getElementById('tv-fnext').addEventListener('click', () => _jumpToOnionFrame(1));
    document.getElementById('tv-fprev').addEventListener('touchstart', (e) => { e.preventDefault(); _jumpToOnionFrame(-1); }, { passive: false });
    document.getElementById('tv-fnext').addEventListener('touchstart', (e) => { e.preventDefault(); _jumpToOnionFrame(1); }, { passive: false });

    document.getElementById('tv-layout').addEventListener('click', () => {
      spriteRowMajor = !spriteRowMajor;
      document.getElementById('tv-layout').textContent = spriteRowMajor ? 'ROW' : 'COL';
      renderTilePage();
    });

    document.getElementById('tv-height').addEventListener('click', () => {
      spriteTall = !spriteTall;
      document.getElementById('tv-height').textContent = spriteTall ? '32' : '24';
      tilePage = 0; renderTilePage();
    });

    document.getElementById('tv-go').addEventListener('click', () => {
      const val = parseInt(document.getElementById('tv-offset').value.replace(/^0x/i,''), 16);
      if (!isNaN(val) && val >= 0) { tileBaseOffset = val; tilePage = 0; renderTilePage(); }
    });

    function openTileViewer() {
      if (!ff3Buffer) return;
      tileRomBuffer = ff3Buffer;
      tileBaseOffset = ONION_KNIGHT_OFFSET;
      tilePage = 0;
      spriteMode = true;
      spriteRowMajor = true;
      spriteTall = false;
      spritePalIdx = 0;
      document.getElementById('tv-rom3').classList.add('active');
      document.getElementById('tv-rom12').classList.remove('active');
      document.getElementById('tv-sprite').classList.add('active');
      document.getElementById('tv-layout').style.display = '';
      document.getElementById('tv-height').style.display = '';
      document.getElementById('tv-pal').style.display = '';
      document.getElementById('tv-layout').textContent = 'ROW';
      document.getElementById('tv-height').textContent = '24';
      document.getElementById('tv-pal').textContent = 'PAL0';
      document.getElementById('tv-frame-row').style.display = '';
      document.getElementById('tv-frame-label').textContent = 'F0 $50010';
      onionFrameIdx = 0;
      document.getElementById('tv-offset').value = ONION_KNIGHT_OFFSET.toString(16).toUpperCase();
      // Seed VICTORY top tiles from ROM (BATTLE_SPRITE_ROM + 24*16 = $50190)
      const _rom = new Uint8Array(ff3Buffer);
      const _vicBase = 0x50010 + 24 * 16;
      okPoseTiles = OK_POSES.map(p => ({ label: p.label, rows: p.rows, cols: p.cols || 2, tiles: p.tiles.map(t => new Uint8Array(t)) }));
      // Seed HIT tiles from ROM (tiles 30-33 portrait + 34-35 legs)
      const _hitBase = 0x50010 + 30 * 16;
      for (let t = 0; t < 6; t++) okPoseTiles[7].tiles[t] = _rom.slice(_hitBase + t * 16, _hitBase + (t + 1) * 16);
      renderTilePage();
      tileViewer.style.display = 'flex';
      tileViewerOpen = true;
    }

    function closeTileViewer() {
      tileViewer.style.display = 'none';
      tileViewerOpen = false;
    }

    // Konami code: up up down down left right left right b a start
    const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','x','z','Enter'];
    let konamiIdx = 0;
    window.addEventListener('keydown', (e) => {
      if (tileViewerOpen) return;
      if (e.key === KONAMI[konamiIdx]) {
        konamiIdx++;
        if (konamiIdx === KONAMI.length) { konamiIdx = 0; openTileViewer(); }
      } else {
        konamiIdx = e.key === KONAMI[0] ? 1 : 0;
      }
    }, true);

    document.getElementById('tv-up').addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (tilePage > 0) { tilePage--; renderTilePage(); }
    }, { passive: false });
    document.getElementById('tv-down').addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (!tileRomBuffer) return;
      const rom = new Uint8Array(tileRomBuffer);
      const pageBytes = spriteMode ? SPRITES_PER_PAGE * (spriteTall ? 8 : 6) * 16 : TILES_PER_PAGE * 16;
      const totalPages = Math.ceil((rom.length - tileBaseOffset) / pageBytes);
      if (tilePage < totalPages - 1) { tilePage++; renderTilePage(); }
    }, { passive: false });
    document.getElementById('tv-close').addEventListener('touchstart', (e) => { e.preventDefault(); closeTileViewer(); }, { passive: false });

    window.addEventListener('keydown', (e) => {
      if (!tileViewerOpen) return;
      if (e.key === 'ArrowDown') { document.getElementById('tv-down').dispatchEvent(new TouchEvent('touchstart')); e.stopImmediatePropagation(); }
      else if (e.key === 'ArrowUp') { document.getElementById('tv-up').dispatchEvent(new TouchEvent('touchstart')); e.stopImmediatePropagation(); }
      else if (e.key === 'x' || e.key === 'X' || e.key === 'Escape') { closeTileViewer(); e.stopImmediatePropagation(); }
    }, true);

    // Mobile touch controls
    document.querySelectorAll('[data-key]').forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.classList.add('pressed');
        window.dispatchEvent(new KeyboardEvent('keydown', { key: btn.dataset.key, bubbles: true }));
      }, { passive: false });
      const release = (e) => {
        e.preventDefault();
        btn.classList.remove('pressed');
        window.dispatchEvent(new KeyboardEvent('keyup', { key: btn.dataset.key, bubbles: true }));
      };
      btn.addEventListener('touchend', release, { passive: false });
      btn.addEventListener('touchcancel', release, { passive: false });
    });
  </script>
</body>
</html>
