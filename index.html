<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FF3 MMO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e1a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    h1 {
      font-size: 20px;
      color: #c8a832;
      text-shadow: 0 0 12px rgba(200, 168, 50, 0.3);
      letter-spacing: 2px;
    }
    #rom-picker {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #rom-picker label {
      cursor: pointer;
      background: linear-gradient(180deg, #3a3a50, #2a2a3e);
      padding: 10px 24px;
      border: 1px solid #555;
      border-radius: 6px;
      color: #c8a832;
      font-size: 13px;
      letter-spacing: 1px;
      transition: background 0.15s, border-color 0.15s;
    }
    #rom-picker label:hover {
      background: linear-gradient(180deg, #4a4a60, #3a3a4e);
      border-color: #c8a832;
    }
    #rom-file, #rom-file-ff12 { display: none; }
    #rom-info {
      font-size: 12px;
      color: #888;
      min-height: 16px;
    }
    #canvas-wrapper {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
      border-radius: 4px;
      box-shadow: 0 0 24px rgba(0, 0, 0, 0.6), 0 0 2px rgba(200, 168, 50, 0.15);
      display: none;
      position: relative;
    }
    #canvas-wrapper.crt::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 1px,
        rgba(0, 0, 0, 0.25) 1px,
        rgba(0, 0, 0, 0.25) 2px
      );
    }
    #game-canvas {
      display: block;
      width: 512px;
      height: 480px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #version-badge {
      position: fixed;
      bottom: 4px;
      left: 6px;
      font-size: 10px;
      color: #333;
      pointer-events: none;
      z-index: 9999;
    }
    #controls-hint {
      font-size: 11px;
      color: #555;
      display: none;
      letter-spacing: 1px;
    }
    #controls-hint kbd {
      background: #222;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 11px;
      color: #aaa;
    }

    @media (max-width: 520px) {
      #controls-hint { display: none !important; }
    }

    /* Mobile layout — flush to top, no gaps */
    @media (max-width: 520px) {
      body {
        justify-content: flex-start;
        gap: 0;
      }
      #canvas-wrapper {
        border-radius: 0;
        border-left: none;
        border-right: none;
      }
    }

    /* Mobile canvas scaling */
    @media (max-width: 520px) {
      #game-canvas {
        width: 100vw;
        height: calc(100vw * (480 / 512));
      }
      #canvas-wrapper.crt::after {
        background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
      }
    }

    /* Mobile controls */
    #mobile-controls {
      display: none;
      flex-direction: column;
      width: 100%;
      user-select: none;
      -webkit-user-select: none;
    }
    #utility-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      background: #0a0a14;
      border-bottom: 1px solid #222;
    }
    #main-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
    }
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 2px;
    }
    .dpad-btn {
      width: 56px;
      height: 56px;
      background: #1e1e2e;
      border: 2px solid #444;
      border-radius: 6px;
      color: #c8a832;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: #3a3a50;
      border-color: #c8a832;
    }
    .dpad-btn.transparent {
      background: transparent;
      border-color: transparent;
      pointer-events: none;
    }
    .dpad-center {
      background: #111;
      border-color: #333;
      pointer-events: none;
    }
    #action-btns {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .action-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid #444;
      background: #1e1e2e;
      color: #c8a832;
      font-size: 20px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active, .action-btn.pressed {
      background: #3a3a50;
      border-color: #c8a832;
    }
    .util-btn {
      flex: 1;
      max-width: 90px;
      padding: 7px 4px;
      border-radius: 14px;
      border: 1px solid #383848;
      background: #16161f;
      color: #888;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      text-align: center;
      touch-action: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .util-btn:active, .util-btn.pressed {
      background: #2a2a3e;
      border-color: #c8a832;
      color: #c8a832;
    }
    @media (max-width: 520px) {
      #mobile-controls {
        display: flex;
      }
    }

    /* Auth screen */
    #auth-screen {
      position: fixed;
      inset: 0;
      background: #0e0e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9998;
    }
    #auth-screen h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: #c8a832;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    #auth-tabs {
      display: flex;
      gap: 0;
      border: 1px solid #444;
      border-radius: 6px;
      overflow: hidden;
    }
    .auth-tab {
      padding: 8px 24px;
      background: #1e1e2e;
      color: #888;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border: none;
      letter-spacing: 1px;
    }
    .auth-tab.active {
      background: #3a3a50;
      color: #c8a832;
    }
    #auth-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 280px;
    }
    #auth-form input {
      background: #1e1e2e;
      border: 2px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 15px;
      font-family: 'Courier New', monospace;
      padding: 10px 14px;
      outline: none;
      width: 100%;
    }
    #auth-form input:focus { border-color: #c8a832; }
    #auth-submit {
      padding: 10px;
      background: linear-gradient(180deg, #3a3a50, #2a2a3e);
      border: 2px solid #555;
      border-radius: 6px;
      color: #c8a832;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      cursor: pointer;
      width: 100%;
    }
    #auth-submit:hover { border-color: #c8a832; }
    #auth-err {
      color: #c04040;
      font-size: 11px;
      min-height: 16px;
      text-align: center;
    }
    #auth-user-bar {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 11px;
      color: #555;
      display: none;
      gap: 8px;
      align-items: center;
      z-index: 100;
    }
    #auth-user-bar span { color: #888; }
    #auth-logout {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      color: #666;
      font-size: 10px;
      font-family: 'Courier New', monospace;
      padding: 2px 8px;
      cursor: pointer;
    }
    #auth-logout:hover { border-color: #c8a832; color: #c8a832; }

    /* Password gate */
    #pw-gate {
      position: fixed;
      inset: 0;
      background: #0e0e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
    }
    #pw-gate h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: #c8a832;
      letter-spacing: 2px;
    }
    #pw-gate input[type=password] {
      background: #1e1e2e;
      border: 2px solid #555;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      padding: 10px 16px;
      outline: none;
      text-align: center;
      width: 220px;
    }
    #pw-gate input[type=password]:focus {
      border-color: #c8a832;
    }
    #pw-gate button {
      padding: 10px 32px;
      background: linear-gradient(180deg, #3a3a50, #2a2a3e);
      border: 2px solid #555;
      border-radius: 6px;
      color: #c8a832;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      cursor: pointer;
    }
    #pw-gate button:hover { border-color: #c8a832; }
    #pw-tagline {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #888;
      letter-spacing: 3px;
    }
    #pw-sub {
      font-size: 12px;
      color: #666;
      text-align: center;
      line-height: 1.8;
      max-width: 320px;
    }
    #pw-gate .pw-err {
      color: #c04040;
      font-size: 12px;
      min-height: 16px;
    }

    /* Font tile viewer overlay */
    #tile-viewer {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0a10;
      display: none;
      flex-direction: column;
      z-index: 500;
      padding: 8px;
      box-sizing: border-box;
    }
    #tile-viewer-header {
      color: #c8a832;
      font-size: 9px;
      letter-spacing: 1px;
      text-align: center;
      padding-bottom: 6px;
      border-bottom: 1px solid #333;
      margin-bottom: 8px;
      flex-shrink: 0;
    }
    #tile-viewer-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      overflow-y: scroll;
      height: 55vh;
      align-content: flex-start;
      padding-bottom: 8px;
    }
    .tile-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 3px;
      border: 1px solid #2a2a3a;
      border-radius: 2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tile-cell.tapped {
      border-color: #c8a832;
      background: #1a1a2e;
    }
    .tile-cell canvas { image-rendering: pixelated; }
    .tile-cell span {
      font-size: 7px;
      color: #555;
      font-family: monospace;
    }
    #tile-viewer-nav {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 8px 0 4px;
      flex-shrink: 0;
    }
    #tile-viewer-nav button {
      width: 64px;
      height: 48px;
      background: #1e1e2e;
      border: 2px solid #444;
      border-radius: 8px;
      color: #c8a832;
      font-size: 20px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #tile-viewer-nav button:active {
      background: #3a3a50;
      border-color: #c8a832;
    }

    /* Hidden input for mobile keyboard */
    #mobile-input {
      position: fixed;
      top: 0;
      left: 0;
      width: 1px;
      height: 1px;
      opacity: 0.01;
      font-size: 16px; /* prevents iOS zoom on focus */
      border: none;
      outline: none;
      background: transparent;
      color: transparent;
      caret-color: transparent;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Auth screen (login / register) -->
  <div id="auth-screen" style="display:none">
    <h2>FF3 MMO</h2>
    <div id="auth-tabs">
      <button class="auth-tab active" id="tab-login">Login</button>
      <button class="auth-tab" id="tab-register">Register</button>
    </div>
    <div id="auth-form">
      <input type="email" id="auth-email" placeholder="email" autocomplete="email">
      <input type="password" id="auth-password" placeholder="password" autocomplete="current-password">
      <div id="auth-err"></div>
      <button id="auth-submit">Login</button>
    </div>
  </div>
  <div id="auth-user-bar">
    <span id="auth-email-display"></span>
    <button id="auth-logout">Logout</button>
  </div>

  <!-- Password gate -->
  <div id="pw-gate">
    <h2>FF3 MMO</h2>
    <p id="pw-tagline">&#9670; Coming Soon &#9670;</p>
    <p id="pw-sub">Something is being built here.<br>Closed beta — invite only.</p>
    <input type="password" id="pw-input" placeholder="beta password" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="pw-submit">Enter</button>
    <div class="pw-err" id="pw-err"></div>
  </div>

  <h1>FF3 MMO</h1>

  <div id="rom-picker-wrap" style="display:none; text-align:center">
    <div id="rom-picker">
      <label for="rom-file">Load FF3 ROM (.nes)</label>
      <input type="file" id="rom-file">
      <br><br>
      <label for="rom-file-ff12">Load FF1&amp;2 ROM (.nes)</label>
      <input type="file" id="rom-file-ff12">
    </div>
    <div id="rom-info"></div>
  </div>

  <div id="canvas-wrapper" class="crt">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="version-badge">v{{VERSION}}</div>
  <div id="tile-viewer">
    <div id="tile-viewer-header">FONT TILES &#9670; TAP = HIGHLIGHT &#9670; X TO CLOSE</div>
    <div id="tile-viewer-grid"></div>
    <div id="tile-viewer-nav">
      <button id="tv-up">▲</button>
      <button id="tv-close">X</button>
      <button id="tv-down">▼</button>
    </div>
  </div>

  <div id="controls-hint"><kbd>&larr;</kbd> <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&rarr;</kbd> Move &nbsp;&middot;&nbsp; <kbd>Z</kbd> Action &nbsp;&middot;&nbsp; <kbd>X</kbd> Back</div>

  <div id="mobile-controls">
    <div id="utility-row">
      <button class="util-btn" data-key="t">CHAT</button>
      <button class="util-btn" data-key="T">LOG</button>
      <button class="util-btn" data-key="s">SELECT</button>
      <button class="util-btn" data-key="Enter">START</button>
      <button class="util-btn" id="btn-tiles">TILES</button>
    </div>
    <div id="main-controls">
      <div id="dpad">
        <div class="dpad-btn transparent"></div>
        <button class="dpad-btn" data-key="ArrowUp">▲</button>
        <div class="dpad-btn transparent"></div>
        <button class="dpad-btn" data-key="ArrowLeft">◀</button>
        <div class="dpad-btn dpad-center"></div>
        <button class="dpad-btn" data-key="ArrowRight">▶</button>
        <div class="dpad-btn transparent"></div>
        <button class="dpad-btn" data-key="ArrowDown">▼</button>
        <div class="dpad-btn transparent"></div>
      </div>
      <div id="action-btns">
        <button class="action-btn" data-key="x">B</button>
        <button class="action-btn" data-key="z">A</button>
      </div>
    </div>
  </div>

  <input type="password" id="mobile-input" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false">

  <script src="lib/libgme.js"></script>
  <script type="module">
    import { init, loadROM, loadFF12ROM, getMobileInputMode } from './src/game.js';
    import { decodeTile, NES_SYSTEM_PALETTE } from './src/tile-decoder.js';

    // --- Auth ---
    const API = '';  // same origin
    let authToken = localStorage.getItem('ff3_token');
    let authEmail = localStorage.getItem('ff3_email');

    const authScreen = document.getElementById('auth-screen');
    const authEmailInput = document.getElementById('auth-email');
    const authPasswordInput = document.getElementById('auth-password');
    const authErr = document.getElementById('auth-err');
    const authSubmit = document.getElementById('auth-submit');
    const authUserBar = document.getElementById('auth-user-bar');
    const authEmailDisplay = document.getElementById('auth-email-display');
    let authMode = 'login';

    document.getElementById('tab-login').addEventListener('click', () => {
      authMode = 'login';
      document.getElementById('tab-login').classList.add('active');
      document.getElementById('tab-register').classList.remove('active');
      authSubmit.textContent = 'Login';
      authErr.textContent = '';
    });
    document.getElementById('tab-register').addEventListener('click', () => {
      authMode = 'register';
      document.getElementById('tab-register').classList.add('active');
      document.getElementById('tab-login').classList.remove('active');
      authSubmit.textContent = 'Register';
      authErr.textContent = '';
    });

    async function doAuth() {
      const email = authEmailInput.value.trim();
      const password = authPasswordInput.value;
      if (!email || !password) { authErr.textContent = 'Fill in all fields.'; return; }
      authSubmit.disabled = true;
      authErr.textContent = '';
      try {
        const res = await fetch(`${API}/api/${authMode}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) { authErr.textContent = data.error || 'Error'; authSubmit.disabled = false; return; }
        authToken = data.token;
        authEmail = data.email;
        localStorage.setItem('ff3_token', authToken);
        localStorage.setItem('ff3_email', authEmail);
        showAuthBar();
        authScreen.style.display = 'none';
        showROMPicker();
      } catch (e) {
        authErr.textContent = 'Network error.';
      }
      authSubmit.disabled = false;
    }

    authSubmit.addEventListener('click', doAuth);
    authPasswordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });
    authEmailInput.addEventListener('keydown', e => { if (e.key === 'Enter') authPasswordInput.focus(); });

    function showAuthBar() {
      authUserBar.style.display = 'flex';
      authEmailDisplay.textContent = authEmail;
    }

    document.getElementById('auth-logout').addEventListener('click', () => {
      localStorage.removeItem('ff3_token');
      localStorage.removeItem('ff3_email');
      authToken = null; authEmail = null;
      authUserBar.style.display = 'none';
      location.reload();
    });

    // --- Server save/load ---
    async function serverSave(slot, data) {
      if (!authToken) return;
      try {
        await fetch(`${API}/api/save`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
          body: JSON.stringify({ slot, data }),
        });
      } catch (e) { console.warn('Save sync failed:', e); }
    }

    async function serverDeleteSave(slot) {
      if (!authToken) return;
      try {
        await fetch(`${API}/api/save`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
          body: JSON.stringify({ slot }),
        });
      } catch (e) { console.warn('Delete sync failed:', e); }
    }

    async function serverLoadSaves() {
      if (!authToken) return null;
      try {
        const res = await fetch(`${API}/api/saves`, {
          headers: { 'Authorization': `Bearer ${authToken}` },
        });
        if (!res.ok) return null;
        const data = await res.json();
        return data.slots;
      } catch { return null; }
    }

    // Expose to game.js via window
    window.ff3Auth = { serverSave, serverDeleteSave, serverLoadSaves };

    // --- Password gate ---
    const GATE_PW = 'ff3dev';
    const gate = document.getElementById('pw-gate');
    const pwInput = document.getElementById('pw-input');
    const pwErr = document.getElementById('pw-err');

    function unlockGate() {
      gate.style.display = 'none';
      sessionStorage.setItem('ff3_auth', '1');
      // Show auth screen if not logged in, else go straight to ROM picker
      if (!authToken) {
        authScreen.style.display = 'flex';
        authEmailInput.focus();
      } else {
        showAuthBar();
        showROMPicker();
      }
    }

    if (sessionStorage.getItem('ff3_auth') === '1') {
      unlockGate();
    } else {
      pwInput.focus();
      document.getElementById('pw-submit').addEventListener('click', checkPw);
      pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });
    }

    function checkPw() {
      if (pwInput.value.trim().toLowerCase() === GATE_PW) {
        unlockGate();
      } else {
        pwErr.textContent = 'Wrong password.';
        pwInput.value = '';
        pwInput.focus();
      }
    }

    function showROMPicker() {
      document.getElementById('rom-picker-wrap').style.display = 'block';
      loadCachedROMs();
    }

    init();

    let ff3Buffer = null;
    let ff12Buffer = null;

    // --- IndexedDB ROM cache ---
    const DB_NAME = 'ff3mmo-roms';
    const DB_VERSION = 1;
    const STORE = 'roms';

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => req.result.createObjectStore(STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function cacheROM(key, buffer) {
      const db = await openDB();
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).put(buffer, key);
      return new Promise((resolve, reject) => {
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    }

    async function getCachedROM(key) {
      const db = await openDB();
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(key);
      return new Promise((resolve) => {
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => resolve(null);
      });
    }

    // --- Launch ---
    async function tryLaunch() {
      if (!ff3Buffer || !ff12Buffer) return;
      try {
        loadFF12ROM(ff12Buffer);
        await loadROM(ff3Buffer);
        document.getElementById('canvas-wrapper').style.display = 'block';
        document.getElementById('controls-hint').style.display = 'block';
        document.getElementById('rom-picker-wrap').style.display = 'none';
        document.querySelector('h1').style.display = 'none';
        document.getElementById('rom-info').style.display = 'none';
      } catch (err) {
        document.getElementById('rom-info').textContent = `Error: ${err.message}`;
        console.error(err);
      }
    }

    async function loadCachedROMs() {
      try {
        const [cached3, cached12] = await Promise.all([
          getCachedROM('ff3'),
          getCachedROM('ff12')
        ]);
        if (cached3) ff3Buffer = cached3;
        if (cached12) ff12Buffer = cached12;
        if (ff3Buffer && ff12Buffer) {
          const picker = document.getElementById('rom-picker');
          picker.innerHTML = '';
          const btn = document.createElement('label');
          btn.textContent = 'Start';
          btn.style.cursor = 'pointer';
          btn.addEventListener('click', () => tryLaunch());
          picker.appendChild(btn);
          document.getElementById('rom-info').textContent = 'ROMs loaded from cache';
        } else if (ff3Buffer) {
          document.getElementById('rom-info').textContent = 'FF3 cached — load FF1&2 ROM';
        } else if (ff12Buffer) {
          document.getElementById('rom-info').textContent = 'FF1&2 cached — load FF3 ROM';
        }
      } catch (e) {
        // IndexedDB unavailable
      }
    }

    document.getElementById('rom-file')?.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      ff3Buffer = await file.arrayBuffer();
      cacheROM('ff3', ff3Buffer).catch(() => {});
      document.getElementById('rom-info').textContent = 'FF3 loaded' + (ff12Buffer ? ' | FF1&2 loaded' : ' — load FF1&2 ROM');
      tryLaunch();
    });

    document.getElementById('rom-file-ff12')?.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      ff12Buffer = await file.arrayBuffer();
      cacheROM('ff12', ff12Buffer).catch(() => {});
      document.getElementById('rom-info').textContent = (ff3Buffer ? 'FF3 loaded | ' : '') + 'FF1&2 loaded' + (!ff3Buffer ? ' — load FF3 ROM' : '');
      tryLaunch();
    });

    // Mobile keyboard — single hidden input for both name entry and chat
    const mobileInput = document.getElementById('mobile-input');
    const AUTOCORRECT_TYPES = new Set(['insertReplacementText']);
    mobileInput.addEventListener('input', (e) => {
      if (e.inputType === 'deleteContentBackward') {
        window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Backspace', bubbles: true }));
      } else if (e.data && !AUTOCORRECT_TYPES.has(e.inputType)) {
        for (const ch of e.data) {
          window.dispatchEvent(new KeyboardEvent('keydown', { key: ch, bubbles: true }));
        }
      }
      mobileInput.value = '';
    });
    mobileInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', bubbles: true })); }
      else if (e.key === 'Escape') { window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape', bubbles: true })); }
    });

    // Poll: focus on name-entry, blur on exit
    let mobileKbMode = 'none';
    setInterval(() => {
      const mode = getMobileInputMode();
      if (mode === mobileKbMode) return;
      mobileKbMode = mode;
      if (mode === 'name') { mobileInput.value = ''; mobileInput.focus(); }
      else if (mode === 'none') { mobileInput.blur(); }
    }, 80);

    // CHAT button: focus input from user gesture (iOS requires this)
    document.querySelectorAll('[data-key="t"]').forEach(btn => {
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        mobileInput.value = '';
        mobileInput.focus();
      }, { passive: false });
    });

    // --- ROM Tile Browser ---
    const tileViewer = document.getElementById('tile-viewer');
    const tileGrid = document.getElementById('tile-viewer-grid');
    const tileHeader = document.getElementById('tile-viewer-header');
    let tileViewerOpen = false;
    const TILES_PER_PAGE = 128;
    let tilePage = 0;

    function renderTilePage() {
      if (!ff3Buffer) return;
      const rom = new Uint8Array(ff3Buffer);
      const totalTiles = Math.floor((rom.length - 16) / 16); // skip iNES header
      const totalPages = Math.ceil(totalTiles / TILES_PER_PAGE);
      const startTile = tilePage * TILES_PER_PAGE;
      const startOff = 16 + startTile * 16;
      tileHeader.textContent = 'ROM TILES — PAGE ' + (tilePage+1) + '/' + totalPages + ' — OFF $' + startOff.toString(16).toUpperCase();
      tileGrid.innerHTML = '';
      for (let i = 0; i < TILES_PER_PAGE && (startTile + i) < totalTiles; i++) {
        const off = startOff + i * 16;
        const pixels = decodeTile(rom, off);
        const c = document.createElement('canvas');
        c.width = 32; c.height = 32;
        const ctx = c.getContext('2d');
        const img = ctx.createImageData(8, 8);
        for (let p = 0; p < 64; p++) {
          const ci = pixels[p];
          const rgb = ci > 0 ? (NES_SYSTEM_PALETTE[0x30] || [255,255,255]) : [0,0,0];
          img.data[p*4]=rgb[0]; img.data[p*4+1]=rgb[1]; img.data[p*4+2]=rgb[2]; img.data[p*4+3]=255;
        }
        ctx.putImageData(img, 0, 0);
        const scaled = document.createElement('canvas');
        scaled.width = 32; scaled.height = 32;
        scaled.getContext('2d').drawImage(c, 0, 0, 32, 32);
        const label = document.createElement('span');
        label.textContent = '$' + off.toString(16).toUpperCase();
        const cell = document.createElement('div');
        cell.className = 'tile-cell';
        cell.appendChild(scaled);
        cell.appendChild(label);
        cell.addEventListener('touchstart', (e) => {
          e.preventDefault();
          cell.classList.add('tapped');
          setTimeout(() => cell.classList.remove('tapped'), 400);
        }, { passive: false });
        tileGrid.appendChild(cell);
      }
      tileGrid.scrollTop = 0;
    }

    function openTileViewer() {
      if (!ff3Buffer) return;
      tilePage = 0;
      renderTilePage();
      tileViewer.style.display = 'flex';
      tileViewerOpen = true;
    }

    function closeTileViewer() {
      tileViewer.style.display = 'none';
      tileViewerOpen = false;
    }

    document.getElementById('btn-tiles').addEventListener('touchend', (e) => {
      e.preventDefault();
      if (tileViewerOpen) closeTileViewer(); else openTileViewer();
    }, { passive: false });

    document.getElementById('tv-up').addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (tilePage > 0) { tilePage--; renderTilePage(); }
    }, { passive: false });
    document.getElementById('tv-down').addEventListener('touchstart', (e) => {
      e.preventDefault();
      const rom = new Uint8Array(ff3Buffer);
      const totalPages = Math.ceil(Math.floor((rom.length - 16) / 16) / TILES_PER_PAGE);
      if (tilePage < totalPages - 1) { tilePage++; renderTilePage(); }
    }, { passive: false });
    document.getElementById('tv-close').addEventListener('touchstart', (e) => { e.preventDefault(); closeTileViewer(); }, { passive: false });

    window.addEventListener('keydown', (e) => {
      if (!tileViewerOpen) return;
      if (e.key === 'ArrowDown') { document.getElementById('tv-down').dispatchEvent(new TouchEvent('touchstart')); e.stopImmediatePropagation(); }
      else if (e.key === 'ArrowUp') { document.getElementById('tv-up').dispatchEvent(new TouchEvent('touchstart')); e.stopImmediatePropagation(); }
      else if (e.key === 'x' || e.key === 'X' || e.key === 'Escape') { closeTileViewer(); e.stopImmediatePropagation(); }
    }, true);

    // Mobile touch controls
    document.querySelectorAll('[data-key]').forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        btn.classList.add('pressed');
        window.dispatchEvent(new KeyboardEvent('keydown', { key: btn.dataset.key, bubbles: true }));
      }, { passive: false });
      const release = (e) => {
        e.preventDefault();
        btn.classList.remove('pressed');
        window.dispatchEvent(new KeyboardEvent('keyup', { key: btn.dataset.key, bubbles: true }));
      };
      btn.addEventListener('touchend', release, { passive: false });
      btn.addEventListener('touchcancel', release, { passive: false });
    });
  </script>
</body>
</html>
